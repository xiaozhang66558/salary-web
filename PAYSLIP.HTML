<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Payslip</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
/* ===== GIỮ NGUYÊN STYLE CŨ ===== */
body{margin:0;font-family:"Segoe UI",Arial;background:#0f172a;display:flex;justify-content:center;padding:40px;}
.card{width:980px;background:white;border-radius:18px;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,0.35);}
.header{background:linear-gradient(90deg,#0f172a,#1e3a8a);color:white;padding:26px 30px;display:flex;justify-content:space-between;align-items:center;}
.header h1{margin:0;font-size:30px;letter-spacing:2px;}
.header-right{display:flex;gap:15px;align-items:center;}
.section{padding:30px;color:#0f172a;}
.section-title{margin-bottom:14px;font-size:18px;letter-spacing:2px;color:#64748b;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;margin-bottom:26px;}
.info-cell{padding:16px;border-right:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb;background:#f8fafc;}
.info-cell:nth-child(2n){border-right:none;}
.info-title{font-size:11px;color:#64748b;letter-spacing:2px;margin-bottom:6px;text-transform:uppercase;}
.info-value{font-size:15px;font-weight:700;}
table{width:100%;border-collapse:collapse;}
th{background:#e2e8f0;padding:12px;text-align:left;}
td{padding:12px;border-bottom:1px solid #e5e7eb;}
.amount{text-align:right;font-weight:700;}
.earn{color:#16a34a;}
.ded{color:#dc2626;}
.adj{color:#2563eb;}
.total-box{margin-top:20px;background:#0b1220;color:white;padding:24px;border-radius:14px;display:flex;justify-content:space-between;align-items:center;}
.total-amount{font-size:30px;font-weight:900;color:#facc15;}
.actions{margin-top:20px;display:flex;gap:12px;}
.btn{padding:12px 16px;border:none;border-radius:10px;font-weight:700;cursor:pointer;}
.btn-back{background:#334155;color:white;}
.btn-save{background:linear-gradient(45deg,#3b82f6,#06b6d4);color:white;}
.footer{text-align:center;font-size:12px;color:#64748b;padding:18px;border-top:1px solid #e5e7eb;}
</style>
</head>

<body>

<div class="card" id="payslipCard">

<div class="header">
<h1 id="pageTitle"></h1>
<div class="header-right">
<select id="langSelect">
<option value="vi">Tiếng Việt</option>
<option value="zh">中文</option>
<option value="en">English</option>
<option value="id">Bahasa</option>
</select>
<div id="periodText"></div>
</div>
</div>

<div class="section">

<div class="section-title" id="empInfoTitle"></div>

<div class="info-grid">
<div class="info-cell"><div class="info-title" id="lblEmpId"></div><div class="info-value" id="empId"></div></div>
<div class="info-cell"><div class="info-title" id="lblFullName"></div><div class="info-value" id="fullName"></div></div>
<div class="info-cell"><div class="info-title" id="lblPlatform"></div><div class="info-value" id="platform"></div></div>
<div class="info-cell"><div class="info-title" id="lblPosition"></div><div class="info-value" id="position"></div></div>
<div class="info-cell"><div class="info-title" id="lblAccountType"></div><div class="info-value" id="accountType"></div></div>
<div class="info-cell"><div class="info-title" id="lblAccountNumber"></div><div class="info-value" id="accountNumber"></div></div>
<div class="info-cell"><div class="info-title" id="lblBasicSalary"></div><div class="info-value" id="basicSalary"></div></div>
<div class="info-cell"></div>
</div>

<h3 id="breakdownTitle"></h3>

<table>
<thead>
<tr>
<th id="thDesc"></th>
<th id="thType"></th>
<th id="thAmount" class="amount"></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div class="note" id="noteBox"></div>

<div class="total-box">
<div id="totalTitle"></div>
<div id="totalAmount" class="total-amount"></div>
</div>

<div class="actions">
<button class="btn btn-back" onclick="goBack()" id="btnBack"></button>
<button class="btn btn-save" onclick="captureScreen()" id="btnSave"></button>
</div>

</div>

<div class="footer" id="footerText"></div>
</div>

<script>
const supabaseUrl="https://apbaseiweunvfgeubvzp.supabase.co";
const supabaseKey="sb_publishable_xxx";
const { createClient } = supabase;
const db=createClient(supabaseUrl,supabaseKey);

/* ===== LANGUAGE FIX ===== */

const i18n={
vi:{pageTitle:"PHIẾU LƯƠNG",empInfoTitle:"THÔNG TIN NHÂN VIÊN",lblEmpId:"MÃ NHÂN VIÊN",lblFullName:"HỌ TÊN",lblPlatform:"NỀN TẢNG",lblPosition:"VỊ TRÍ",lblAccountType:"LOẠI TÀI KHOẢN",lblAccountNumber:"SỐ TÀI KHOẢN",lblBasicSalary:"LƯƠNG CƠ BẢN",breakdownTitle:"Chi tiết lương",thDesc:"Hạng mục",thType:"Loại",thAmount:"Số tiền",earn:"THU",ded:"TRỪ",adj:"Đ/C",totalTitle:"Thực nhận",footer:"Đây là phiếu lương tạo tự động.",back:"← Quay lại",save:"📸 Chụp màn hình"},
zh:{pageTitle:"工资单",empInfoTitle:"员工信息",lblEmpId:"员工ID",lblFullName:"姓名",lblPlatform:"平台",lblPosition:"岗位",lblAccountType:"账户类型",lblAccountNumber:"账号",lblBasicSalary:"基础工资",breakdownTitle:"薪资明细",thDesc:"项目",thType:"类型",thAmount:"金额",earn:"收入",ded:"扣除",adj:"调整",totalTitle:"实发合计",footer:"系统生成薪资单。",back:"← 返回",save:"📸 保存图片"},
en:{pageTitle:"PAYSLIP",empInfoTitle:"EMPLOYEE INFORMATION",lblEmpId:"EMPLOYEE ID",lblFullName:"FULL NAME",lblPlatform:"PLATFORM",lblPosition:"POSITION",lblAccountType:"ACCOUNT TYPE",lblAccountNumber:"ACCOUNT NUMBER",lblBasicSalary:"BASIC SALARY",breakdownTitle:"Salary Breakdown",thDesc:"Description",thType:"Type",thAmount:"Amount",earn:"EARN",ded:"DED",adj:"ADJ",totalTitle:"Total Take Home Pay",footer:"Computer-generated salary statement.",back:"← Back",save:"📸 Save Image"},
id:{pageTitle:"SLIP GAJI",empInfoTitle:"INFORMASI KARYAWAN",lblEmpId:"ID KARYAWAN",lblFullName:"NAMA",lblPlatform:"PLATFORM",lblPosition:"POSISI",lblAccountType:"JENIS AKUN",lblAccountNumber:"NOMOR AKUN",lblBasicSalary:"GAJI POKOK",breakdownTitle:"Rincian Gaji",thDesc:"Keterangan",thType:"Tipe",thAmount:"Jumlah",earn:"MASUK",ded:"POTONG",adj:"ADJ",totalTitle:"Total Diterima",footer:"Slip otomatis.",back:"← Kembali",save:"📸 Simpan Gambar"}
};

let currentLang="vi";
document.getElementById("langSelect").onchange=function(){
currentLang=this.value;
applyLang();
render();
};

function applyLang(){
let d=i18n[currentLang];
for(let k in d){
let el=document.getElementById(k);
if(el) el.innerText=d[k];
}
document.getElementById("btnBack").innerText=d.back;
document.getElementById("btnSave").innerText=d.save;
}

/* ===== BASIC SALARY FIX ===== */
function parseBasic(v){
if(!v) return null;
let match=String(v).match(/\d+/);
return match?Number(match[0]):null;
}

/* ===== SCREENSHOT ===== */
function captureScreen(){
html2canvas(document.getElementById("payslipCard")).then(canvas=>{
let link=document.createElement("a");
link.download="Payslip.png";
link.href=canvas.toDataURL();
link.click();
});
}

function goBack(){window.location.href="dashboard.html";}
</script>

</body>
</html>
