<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Payslip</title>

<style>
body{
margin:0;
font-family: "Segoe UI", Arial;
background:#0f172a;
color:#1e293b;
display:flex;
justify-content:center;
padding:40px;
}

.card{
width:900px;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 25px 60px rgba(0,0,0,0.3);
}

/* HEADER */
.header{
background:linear-gradient(90deg,#0f172a,#1e3a8a);
color:white;
padding:30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h1{
margin:0;
letter-spacing:2px;
font-size:28px;
}

.period{
font-size:18px;
opacity:0.9;
}

/* SECTION */
.section{
padding:30px;
}

.info-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:30px;
}

.info-box{
background:#f1f5f9;
padding:15px;
border-radius:8px;
}

.info-title{
font-size:12px;
color:#64748b;
margin-bottom:5px;
}

.info-value{
font-size:15px;
font-weight:600;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:12px;
background:#e2e8f0;
font-size:13px;
}

td{
padding:12px;
border-bottom:1px solid #e5e7eb;
font-size:14px;
}

.amount{
text-align:right;
font-weight:600;
}

.earn{color:#16a34a;}
.ded{color:#dc2626;}
.adj{color:#2563eb;}

/* TOTAL */
.total-box{
margin-top:25px;
background:#0f172a;
color:white;
padding:25px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
}

.total-box span{
font-size:28px;
font-weight:bold;
color:#facc15;
}

.footer{
text-align:center;
font-size:12px;
color:#64748b;
padding:20px;
border-top:1px solid #e5e7eb;
}
</style>
</head>

<body>

<div class="card">

<div class="header">
<h1>PAYSLIP</h1>
<div class="period" id="periodText"></div>
</div>

<div class="section">

<div class="info-grid">
<div class="info-box">
<div class="info-title">EMPLOYEE ID</div>
<div class="info-value" id="empId"></div>
</div>

<div class="info-box">
<div class="info-title">FULL NAME</div>
<div class="info-value" id="fullName"></div>
</div>
</div>

<h3>Salary Breakdown</h3>

<table id="salaryTable">
<thead>
<tr>
<th>Description</th>
<th>Type</th>
<th class="amount">Amount</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="total-box">
<div>Total Take Home Pay</div>
<span id="totalAmount">0</span>
</div>

</div>

<div class="footer">
This is a computer-generated salary statement. No signature required.
</div>

</div>

<script>
const salaryData = JSON.parse(localStorage.getItem("salaryData"));
const period = localStorage.getItem("period");
const empId = localStorage.getItem("emp_id");

if(!salaryData){
document.body.innerHTML="<h2 style='color:white'>No salary data found.</h2>";
throw new Error("No salary");
}

document.getElementById("periodText").innerText = period;
document.getElementById("empId").innerText = empId;
document.getElementById("fullName").innerText = salaryData["姓名"] || "-";

const tbody = document.querySelector("#salaryTable tbody");

let total = 0;

function formatMoney(num){
return Number(num).toLocaleString();
}

for(let key in salaryData){

let value = salaryData[key];
if(!value || value==="NaN" || key==="ID") continue;

let amount = Number(value);
if(isNaN(amount)) continue;

let type="earn";
if(key.includes("扣") || key.includes("押")) type="ded";
if(key.includes("额外") || key.includes("调整")) type="adj";

if(type==="earn") total += amount;
if(type==="ded") total -= amount;
if(type==="adj") total += amount;

let row = `
<tr>
<td>${key}</td>
<td>${type.toUpperCase()}</td>
<td class="amount ${type}">${type==="ded"?"- ":"+ "}${formatMoney(amount)}</td>
</tr>
`;

tbody.innerHTML += row;
}

document.getElementById("totalAmount").innerText = formatMoney(total);
</script>

</body>
</html>
