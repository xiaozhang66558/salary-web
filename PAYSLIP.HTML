<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Payslip</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>

<style>
body{
margin:0;
font-family:"Segoe UI",Arial;
background:#0f172a;
display:flex;
justify-content:center;
padding:40px;
}

.card{
width:950px;
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 30px 80px rgba(0,0,0,0.5);
}

.header{
background:linear-gradient(90deg,#0f172a,#1e3a8a);
color:white;
padding:35px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h1{
margin:0;
letter-spacing:3px;
font-size:30px;
}

.period{
font-size:18px;
opacity:0.9;
}

.section{
padding:35px;
}

.section-title{
letter-spacing:2px;
font-size:13px;
color:#64748b;
margin-bottom:15px;
}

.info-table{
width:100%;
border-collapse:collapse;
margin-bottom:30px;
}

.info-table td{
border:1px solid #e5e7eb;
padding:15px;
background:#f8fafc;
}

.label{
font-size:12px;
color:#64748b;
letter-spacing:1px;
margin-bottom:5px;
}

.value{
font-weight:600;
font-size:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:14px;
background:#e2e8f0;
font-size:13px;
}

td{
padding:14px;
border-bottom:1px solid #e5e7eb;
font-size:14px;
}

.amount{
text-align:right;
font-weight:600;
}

.earn{color:#16a34a;}
.ded{color:#dc2626;}
.adj{color:#2563eb;}

.total-box{
margin-top:30px;
background:#0f172a;
color:white;
padding:30px;
border-radius:14px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
}

.total-box span{
font-size:30px;
font-weight:bold;
color:#facc15;
}

.btn-group{
margin-top:30px;
display:flex;
gap:20px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.back-btn{
background:#334155;
color:white;
}

.download-btn{
background:linear-gradient(45deg,#3b82f6,#06b6d4);
color:white;
}

.footer{
text-align:center;
font-size:12px;
color:#64748b;
padding:25px;
border-top:1px solid #e5e7eb;
}
</style>
</head>

<body>

<div class="card" id="payslipCard">

<div class="header">
<h1 id="titleText">PAYSLIP</h1>

<div style="display:flex;align-items:center;gap:15px;">
<select id="langSelect" onchange="changeLang()" style="padding:6px;border-radius:6px;">
<option value="cn">中文</option>
<option value="vi">Tiếng Việt</option>
<option value="en">English</option>
<option value="ph">Filipino</option>
</select>

<div class="period" id="periodText"></div>
</div>
</div>

<div class="section">

<!-- EMPLOYEE INFORMATION -->
<div class="section-title">EMPLOYEE INFORMATION</div>

<table class="info-table">
<tr>
<td>
<div class="label">EMPLOYEE ID</div>
<div class="value" id="empId"></div>
</td>
<td>
<div class="label">FULL NAME</div>
<div class="value" id="fullName"></div>
</td>
</tr>

<tr>
<td>
<div class="label">PLATFORM</div>
<div class="value" id="platform"></div>
</td>
<td>
<div class="label">POSITION</div>
<div class="value" id="position"></div>
</td>
</tr>

<tr>
<td>
<div class="label">ACCOUNT TYPE</div>
<div class="value" id="accountType"></div>
</td>
<td>
<div class="label">ACCOUNT NUMBER</div>
<div class="value" id="accountNumber"></div>
</td>
</tr>
</table>

<h3 id="breakdownText">Salary Breakdown</h3>

<table>
<thead>
<tr>
<th>Description</th>
<th>Type</th>
<th class="amount">Amount</th>
</tr>
</thead>
<tbody id="salaryBody"></tbody>
</table>

<div class="total-box">
<div id="totalText">Total Take Home Pay</div>
<span id="totalAmount">0</span>
</div>

<div class="btn-group">
<button class="back-btn" onclick="goBack()">⬅ Back</button>
<button class="download-btn" onclick="downloadPDF()">⬇ Download PDF</button>
</div>

</div>

<div class="footer">
This is a computer-generated salary statement.
</div>

</div>

<script>

const supabaseUrl="https://apbaseiweunvfgeubvzp.supabase.co";
const supabaseKey="sb_publishable_Dwob1zf-bHC2etDsbnJREw_sgaHuQDL";
const { createClient } = supabase;
const db=createClient(supabaseUrl,supabaseKey);

let salaryDataGlobal=null;
let currentLang=localStorage.getItem("lang")||"cn";

function changeLang(){
currentLang=document.getElementById("langSelect").value;
localStorage.setItem("lang",currentLang);
}

async function loadSlip(){

const emp_id=localStorage.getItem("emp_id");
if(!emp_id){window.location.href="index.html";return;}

const urlParams=new URLSearchParams(window.location.search);
const period=urlParams.get("period");
document.getElementById("periodText").innerText=period;

const {data}=await db
.from("salaries")
.select("*")
.eq("emp_id",emp_id)
.eq("period",period)
.single();

salaryDataGlobal=data.data;

/* EMPLOYEE INFO */
document.getElementById("empId").innerText=emp_id;
document.getElementById("fullName").innerText=salaryDataGlobal["姓名"]||"-";
document.getElementById("platform").innerText=salaryDataGlobal["盘口"]||"-";
document.getElementById("position").innerText=salaryDataGlobal["岗位"]||"-";
document.getElementById("accountType").innerText=salaryDataGlobal["银行/GCASH"]||"-";
document.getElementById("accountNumber").innerText=salaryDataGlobal["卡号"]||"-";

renderSalary();
}

function renderSalary(){

const body=document.getElementById("salaryBody");
body.innerHTML="";

let total=salaryDataGlobal["1-15 工资"]||0;

for(let key in salaryDataGlobal){

let rawValue=salaryDataGlobal[key];
if(rawValue===undefined||rawValue===null||rawValue===""||rawValue==="NaN") continue;

if(typeof rawValue==="number"||!isNaN(rawValue)){
let amount=Number(rawValue);
if(isNaN(amount)) continue;

let type="earn";
if(key.includes("扣")||key.includes("押")) type="ded";
if(key.includes("额外")) type="adj";

body.innerHTML+=`
<tr>
<td>${key}</td>
<td>${type.toUpperCase()}</td>
<td class="amount ${type}">${amount.toLocaleString()}</td>
</tr>`;
}
}

if(salaryDataGlobal["备注"]){
body.innerHTML+=`
<tr>
<td colspan="3" style="padding-top:20px;font-style:italic;color:#64748b">
备注: ${salaryDataGlobal["备注"]}
</td>
</tr>`;
}

document.getElementById("totalAmount").innerText=
Number(total).toLocaleString();
}

function goBack(){
window.location.href="dashboard.html";
}

function downloadPDF(){
const element=document.getElementById("payslipCard");
html2pdf().set({
margin:10,
filename:'Payslip.pdf',
html2canvas:{scale:2},
jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
}).from(element).save();
}

document.getElementById("langSelect").value=currentLang;
loadSlip();

</script>

</body>
</html>
