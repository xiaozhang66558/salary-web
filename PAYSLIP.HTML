<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Payslip</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>

<style>
body{
margin:0;
font-family:"Segoe UI",Arial;
background:#0f172a;
display:flex;
justify-content:center;
padding:40px;
}

.card{
width:950px;
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 30px 80px rgba(0,0,0,0.5);
}

.header{
background:linear-gradient(90deg,#0f172a,#1e3a8a);
color:white;
padding:35px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h1{
margin:0;
letter-spacing:3px;
font-size:30px;
}

.period{
font-size:18px;
opacity:0.9;
}

.section{
padding:35px;
}

.section-title{
letter-spacing:2px;
font-size:13px;
color:#64748b;
margin-bottom:15px;
}

.info-table{
width:100%;
border-collapse:collapse;
margin-bottom:30px;
}

.info-table td{
border:1px solid #e5e7eb;
padding:15px;
background:#f8fafc;
}

.label{
font-size:12px;
color:#64748b;
letter-spacing:1px;
margin-bottom:5px;
text-transform:uppercase;
}

.value{
font-weight:600;
font-size:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:14px;
background:#e2e8f0;
font-size:13px;
}

td{
padding:14px;
border-bottom:1px solid #e5e7eb;
font-size:14px;
}

.amount{
text-align:right;
font-weight:600;
}

.earn{color:#16a34a;}
.ded{color:#dc2626;}
.adj{color:#2563eb;}

.note-row{
padding-top:20px;
font-style:italic;
color:#64748b;
}

.total-box{
margin-top:30px;
background:#0f172a;
color:white;
padding:30px;
border-radius:14px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
}

.total-box span{
font-size:30px;
font-weight:bold;
color:#facc15;
}

.btn-group{
margin-top:30px;
display:flex;
gap:20px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.back-btn{
background:#334155;
color:white;
}

.download-btn{
background:linear-gradient(45deg,#3b82f6,#06b6d4);
color:white;
}

.footer{
text-align:center;
font-size:12px;
color:#64748b;
padding:25px;
border-top:1px solid #e5e7eb;
}
</style>
</head>

<body>

<div class="card" id="payslipCard">

<div class="header">
<h1 id="titleText">PAYSLIP</h1>

<div style="display:flex;align-items:center;gap:15px;">
<select id="langSelect" onchange="changeLang()" style="padding:6px 10px;border-radius:6px;">
<option value="cn">中文</option>
<option value="vi">Tiếng Việt</option>
<option value="en">English</option>
<option value="id">Indonesia</option>
</select>

<div class="period" id="periodText"></div>
</div>
</div>

<div class="section">

<div class="section-title" id="empInfoTitle">EMPLOYEE INFORMATION</div>

<table class="info-table">
<tr>
<td>
<div class="label" id="lblEmpId">EMPLOYEE ID</div>
<div class="value" id="empId"></div>
</td>
<td>
<div class="label" id="lblFullName">FULL NAME</div>
<div class="value" id="fullName"></div>
</td>
</tr>

<tr>
<td>
<div class="label" id="lblPlatform">PLATFORM</div>
<div class="value" id="platform"></div>
</td>
<td>
<div class="label" id="lblPosition">POSITION</div>
<div class="value" id="position"></div>
</td>
</tr>

<tr>
<td>
<div class="label" id="lblAccountType">ACCOUNT TYPE</div>
<div class="value" id="accountType"></div>
</td>
<td>
<div class="label" id="lblAccountNumber">ACCOUNT NUMBER</div>
<div class="value" id="accountNumber"></div>
</td>
</tr>
</table>

<h3 id="breakdownText">Salary Breakdown</h3>

<table>
<thead>
<tr>
<th id="thDesc">Description</th>
<th id="thType">Type</th>
<th class="amount" id="thAmount">Amount</th>
</tr>
</thead>
<tbody id="salaryBody"></tbody>
</table>

<div class="total-box">
<div id="totalText">Total Take Home Pay</div>
<span id="totalAmount">0</span>
</div>

<div class="btn-group">
<button class="back-btn" onclick="goBack()" id="btnBack">⬅ Back</button>
<button class="download-btn" onclick="downloadPDF()" id="btnDownload">⬇ Download PDF</button>
</div>

</div>

<div class="footer" id="footerText">
This is a computer-generated salary statement.
</div>

</div>

<script>
const supabaseUrl="https://apbaseiweunvfgeubvzp.supabase.co";
const supabaseKey="sb_publishable_Dwob1zf-bHC2etDsbnJREw_sgaHuQDL";
const { createClient } = supabase;
const db=createClient(supabaseUrl,supabaseKey);

let salaryDataGlobal=null;
let currentLang=localStorage.getItem("lang")||"cn";

/** UI translations */
const UI = {
cn:{
payslip:"PAYSLIP",
empInfo:"EMPLOYEE INFORMATION",
breakdown:"Salary Breakdown",
desc:"Description", type:"Type", amount:"Amount",
total:"Total Take Home Pay",
back:"⬅ 返回", download:"⬇ 下载 PDF",
footer:"此为系统生成薪资单，无需签名。",
lblEmpId:"员工ID", lblFullName:"姓名",
lblPlatform:"盘口", lblPosition:"岗位",
lblAccountType:"账户类型", lblAccountNumber:"卡号",
note:"备注"
},
vi:{
payslip:"PHIẾU LƯƠNG",
empInfo:"THÔNG TIN NHÂN VIÊN",
breakdown:"Chi tiết lương",
desc:"Hạng mục", type:"Loại", amount:"Số tiền",
total:"Thực nhận",
back:"⬅ Quay lại", download:"⬇ Tải PDF",
footer:"Đây là phiếu lương do hệ thống tạo, không cần chữ ký.",
lblEmpId:"Mã nhân viên", lblFullName:"Họ tên",
lblPlatform:"Nền tảng", lblPosition:"Vị trí",
lblAccountType:"Loại tài khoản", lblAccountNumber:"Số tài khoản",
note:"Ghi chú"
},
en:{
payslip:"PAYSLIP",
empInfo:"EMPLOYEE INFORMATION",
breakdown:"Salary Breakdown",
desc:"Item", type:"Type", amount:"Amount",
total:"Total Take Home Pay",
back:"⬅ Back", download:"⬇ Download PDF",
footer:"This is a computer-generated salary statement. No signature required.",
lblEmpId:"Employee ID", lblFullName:"Full Name",
lblPlatform:"Platform", lblPosition:"Position",
lblAccountType:"Account Type", lblAccountNumber:"Account Number",
note:"Note"
},
id:{
payslip:"SLIP GAJI",
empInfo:"INFORMASI KARYAWAN",
breakdown:"Rincian Gaji",
desc:"Item", type:"Tipe", amount:"Jumlah",
total:"Total Diterima",
back:"⬅ Kembali", download:"⬇ Unduh PDF",
footer:"Ini adalah slip gaji yang dibuat oleh sistem. Tidak perlu tanda tangan.",
lblEmpId:"ID Karyawan", lblFullName:"Nama Lengkap",
lblPlatform:"Platform", lblPosition:"Posisi",
lblAccountType:"Tipe Akun", lblAccountNumber:"Nomor Akun",
note:"Catatan"
}
};

/** Salary column translations (Chinese key -> translated label) */
const COL = {
"盘口": {vi:"Nền tảng", en:"Platform", id:"Platform"},
"岗位": {vi:"Vị trí", en:"Position", id:"Posisi"},
"ID": {vi:"Mã nhân viên", en:"Employee ID", id:"ID Karyawan"},
"姓名": {vi:"Họ tên", en:"Full Name", id:"Nama Lengkap"},
"卡号": {vi:"Số tài khoản", en:"Account Number", id:"Nomor Akun"},
"银行姓名": {vi:"Tên ngân hàng", en:"Bank Name", id:"Nama Bank"},
"银行/GCASH": {vi:"Ngân hàng/GCASH", en:"Bank/GCASH", id:"Bank/GCASH"},
"基础工资": {vi:"Lương cơ bản", en:"Basic Salary", id:"Gaji Pokok"},
"出勤工资": {vi:"Lương chuyên cần", en:"Attendance Salary", id:"Gaji Kehadiran"},
"休假扣除": {vi:"Khấu trừ nghỉ phép", en:"Leave Deduction", id:"Potongan Cuti"},
"押金": {vi:"Tiền cọc", en:"Security Deposit", id:"Deposit"},
"满勤": {vi:"Thưởng chuyên cần", en:"Full Attendance Bonus", id:"Bonus Kehadiran"},
"额外加扣": {vi:"Điều chỉnh thêm", en:"Extra / Adjustment", id:"Tambahan / Penyesuaian"},
"备注": {vi:"Ghi chú", en:"Note", id:"Catatan"},
"1-15 工资": {vi:"Lương 1-15", en:"Salary (1-15)", id:"Gaji (1-15)"},
"16-30 工资": {vi:"Lương 16-30", en:"Salary (16-30)", id:"Gaji (16-30)"}
};

function tCol(key){
if(currentLang==="cn") return key;
return (COL[key] && COL[key][currentLang]) ? COL[key][currentLang] : key;
}

function tType(type){
if(currentLang==="cn") return type; // keep EARN/DED/ADJ if you want
if(currentLang==="vi"){
if(type==="EARN") return "THU";
if(type==="DED") return "TRỪ";
if(type==="ADJ") return "Đ/C";
}
if(currentLang==="id"){
if(type==="EARN") return "MASUK";
if(type==="DED") return "POTONG";
if(type==="ADJ") return "ADJ";
}
return type; // EN keep
}

function applyLang(){
const L = UI[currentLang];

document.getElementById("titleText").innerText = L.payslip;
document.getElementById("empInfoTitle").innerText = L.empInfo;
document.getElementById("breakdownText").innerText = L.breakdown;

document.getElementById("thDesc").innerText = L.desc;
document.getElementById("thType").innerText = L.type;
document.getElementById("thAmount").innerText = L.amount;

document.getElementById("totalText").innerText = L.total;
document.getElementById("btnBack").innerText = L.back;
document.getElementById("btnDownload").innerText = L.download;
document.getElementById("footerText").innerText = L.footer;

document.getElementById("lblEmpId").innerText = L.lblEmpId;
document.getElementById("lblFullName").innerText = L.lblFullName;
document.getElementById("lblPlatform").innerText = L.lblPlatform;
document.getElementById("lblPosition").innerText = L.lblPosition;
document.getElementById("lblAccountType").innerText = L.lblAccountType;
document.getElementById("lblAccountNumber").innerText = L.lblAccountNumber;

if(salaryDataGlobal) renderSalary(); // rerender to translate rows
}

function changeLang(){
currentLang=document.getElementById("langSelect").value;
localStorage.setItem("lang", currentLang);
applyLang();
}

async function loadSlip(){
const emp_id=localStorage.getItem("emp_id");
if(!emp_id){window.location.href="index.html";return;}

const urlParams=new URLSearchParams(window.location.search);
const period=urlParams.get("period");
document.getElementById("periodText").innerText=period;

const {data, error}=await db
.from("salaries")
.select("*")
.eq("emp_id",emp_id)
.eq("period",period)
.single();

if(error || !data){
document.body.innerHTML="<h2 style='color:white'>No salary data found.</h2>";
return;
}

salaryDataGlobal=data.data || {};

document.getElementById("empId").innerText=emp_id;
document.getElementById("fullName").innerText=salaryDataGlobal["姓名"]||salaryDataGlobal["full_name"]||"-";
document.getElementById("platform").innerText=salaryDataGlobal["盘口"]||"-";
document.getElementById("position").innerText=salaryDataGlobal["岗位"]||"-";
document.getElementById("accountType").innerText=salaryDataGlobal["银行/GCASH"]||"-";
document.getElementById("accountNumber").innerText=salaryDataGlobal["卡号"]||"-";

applyLang();
}

function parseNumber(val){
if(val===null || val===undefined) return null;
if(typeof val==="number") return isNaN(val) ? null : val;
let s=String(val).trim();
if(!s) return null;
s=s.replace(/,/g,"");
const n=Number(s);
return isNaN(n) ? null : n;
}

function formatMoney(n){
try{ return Number(n).toLocaleString(); }catch(e){ return String(n); }
}

function detectTypeByKey(key){
let type="EARN";
if(key.includes("扣") || key.includes("押")) type="DED";
if(key.includes("额外") || key.includes("调整")) type="ADJ";
return type;
}

function renderSalary(){
const body=document.getElementById("salaryBody");
body.innerHTML="";

const keysOrder = [
"基础工资","出勤工资","休假扣除","押金","满勤","额外加扣",
"卡号","银行姓名","银行/GCASH",
"盘口","岗位",
"1-15 工资","16-30 工资"
];

const used=new Set();
let total = 0;

/** Total priority: if P column/total stored in sheet, we use salary column first.
    Your table uses “1-15 工资” (or maybe other period salary). We'll prioritize:
    1) "1-15 工资" then 2) "16-30 工资" then 3) computed sum.
**/
const totalFromSalary =
parseNumber(salaryDataGlobal["1-15 工资"]) ??
parseNumber(salaryDataGlobal["16-30 工资"]);

function addRow(label, type, amount, css){
body.innerHTML += `
<tr>
<td>${label}</td>
<td>${tType(type)}</td>
<td class="amount ${css}">${css==="ded" ? "- " : css==="earn" ? "+ " : ""}${formatMoney(amount)}</td>
</tr>`;
}

/** Render ordered keys first (only numeric fields) */
for(const k of keysOrder){
if(!(k in salaryDataGlobal)) continue;
used.add(k);

const n=parseNumber(salaryDataGlobal[k]);
if(n===null) continue;

const t=detectTypeByKey(k);
if(t==="EARN"){ total += n; addRow(tCol(k), "EARN", n, "earn"); }
if(t==="DED"){ total -= n; addRow(tCol(k), "DED", n, "ded"); }
if(t==="ADJ"){ total += n; addRow(tCol(k), "ADJ", n, "adj"); }
}

/** Render remaining numeric fields (exclude ID/姓名 etc) */
for(const k in salaryDataGlobal){
if(used.has(k)) continue;
if(k==="ID" || k==="姓名" || k==="备注" || k==="盘口" || k==="岗位" || k==="卡号" || k==="银行姓名" || k==="银行/GCASH") continue;

const n=parseNumber(salaryDataGlobal[k]);
if(n===null) continue;

const t=detectTypeByKey(k);
if(t==="EARN"){ total += n; addRow(tCol(k), "EARN", n, "earn"); }
if(t==="DED"){ total -= n; addRow(tCol(k), "DED", n, "ded"); }
if(t==="ADJ"){ total += n; addRow(tCol(k), "ADJ", n, "adj"); }
}

/** Note row at bottom */
const note = salaryDataGlobal["备注"];
if(note){
body.innerHTML += `
<tr>
<td colspan="3" class="note-row">
${UI[currentLang].note}: ${note}
</td>
</tr>`;
}

/** final total */
const finalTotal = (totalFromSalary!==null) ? totalFromSalary : total;
document.getElementById("totalAmount").innerText = formatMoney(finalTotal);
}

function goBack(){
window.location.href="dashboard.html";
}

function downloadPDF(){
const element=document.getElementById("payslipCard");
html2pdf().set({
margin:10,
filename:'Payslip.pdf',
html2canvas:{scale:2},
jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
}).from(element).save();
}

/** init */
document.getElementById("langSelect").value=currentLang;
loadSlip();
</script>

</body>
</html>
