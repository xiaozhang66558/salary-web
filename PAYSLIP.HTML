<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Payslip</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family: "Segoe UI", Arial;
background:#0f172a;
display:flex;
justify-content:center;
padding:40px;
}

.card{
width:950px;
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 30px 80px rgba(0,0,0,0.5);
}

/* HEADER */
.header{
background:linear-gradient(90deg,#0f172a,#1e3a8a);
color:white;
padding:35px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h1{
margin:0;
letter-spacing:3px;
font-size:30px;
}

.period{
font-size:18px;
opacity:0.9;
}

/* SECTION */
.section{
padding:35px;
}

/* INFO GRID */
.info-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:35px;
}

.info-box{
background:#f1f5f9;
padding:15px;
border-radius:10px;
}

.info-title{
font-size:12px;
color:#64748b;
margin-bottom:6px;
}

.info-value{
font-size:15px;
font-weight:600;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:14px;
background:#e2e8f0;
font-size:13px;
}

td{
padding:14px;
border-bottom:1px solid #e5e7eb;
font-size:14px;
}

.amount{
text-align:right;
font-weight:600;
}

.earn{color:#16a34a;}
.ded{color:#dc2626;}
.adj{color:#2563eb;}

/* TOTAL */
.total-box{
margin-top:30px;
background:#0f172a;
color:white;
padding:30px;
border-radius:14px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
}

.total-box span{
font-size:30px;
font-weight:bold;
color:#facc15;
}

.footer{
text-align:center;
font-size:12px;
color:#64748b;
padding:25px;
border-top:1px solid #e5e7eb;
}
</style>
</head>

<body>

<div class="card">

<div class="header">
<h1>PAYSLIP</h1>
<div class="period" id="periodText"></div>
</div>

<div class="section">

<div class="info-grid" id="infoGrid"></div>

<h3>Salary Breakdown</h3>

<table>
<thead>
<tr>
<th>Description</th>
<th>Type</th>
<th class="amount">Amount</th>
</tr>
</thead>
<tbody id="salaryBody"></tbody>
</table>

<div class="total-box">
<div>Total Take Home Pay</div>
<span id="totalAmount">0</span>
</div>

</div>

<div class="footer">
This is a computer-generated salary statement. No signature required.
</div>

</div>

<script>

const supabaseUrl="https://apbaseiweunvfgeubvzp.supabase.co";
const supabaseKey="sb_publishable_Dwob1zf-bHC2etDsbnJREw_sgaHuQDL";

const { createClient } = supabase;
const db=createClient(supabaseUrl,supabaseKey);

async function loadSlip(){

const emp_id=localStorage.getItem("emp_id");

if(!emp_id){
window.location.href="index.html";
return;
}

const urlParams=new URLSearchParams(window.location.search);
const period=urlParams.get("period");

if(!period){
document.body.innerHTML="<h2 style='color:white'>No salary data found.</h2>";
return;
}

document.getElementById("periodText").innerText=period;

const {data,error}=await db
.from("salaries")
.select("*")
.eq("emp_id",emp_id)
.eq("period",period)
.single();

if(error || !data){
document.body.innerHTML="<h2 style='color:white'>No salary data found.</h2>";
return;
}

const salaryData=data.data;

/* ===== EMPLOYEE INFO ===== */

const info=document.getElementById("infoGrid");

function addInfo(title,value){
info.innerHTML+=`
<div class="info-box">
<div class="info-title">${title}</div>
<div class="info-value">${value ?? "-"}</div>
</div>`;
}

addInfo("盘口",salaryData["盘口"]);
addInfo("岗位",salaryData["岗位"]);
addInfo("ID",salaryData["ID"]);
addInfo("姓名",salaryData["姓名"]);
addInfo("卡号",salaryData["卡号"]);
addInfo("银行姓名",salaryData["银行姓名"]);
addInfo("银行/GCASH",salaryData["银行/GCASH"]);

/* ===== SALARY BREAKDOWN ===== */

const body=document.getElementById("salaryBody");

function formatMoney(num){
return Number(num || 0).toLocaleString();
}

const fields=[
"基础工资",
"出勤工资",
"满勤",
"额外加扣",
"押金",
"休假扣除"
];

fields.forEach(field=>{

let value=salaryData[field];
if(value===undefined || value===null || value==="") value=0;

let amount=Number(value);
if(isNaN(amount)) amount=0;

let type="earn";
if(field.includes("扣") || field.includes("押")) type="ded";
if(field.includes("额外")) type="adj";

body.innerHTML+=`
<tr>
<td>${field}</td>
<td>${type.toUpperCase()}</td>
<td class="amount ${type}">
${type==="ded"?"- ":"+ "}${formatMoney(amount)}
</td>
</tr>`;
});

/* ===== 备注 放在最后一行 ===== */

if(salaryData["备注"]){
body.innerHTML+=`
<tr>
<td colspan="3" style="padding-top:20px;font-style:italic;color:#64748b">
备注: ${salaryData["备注"]}
</td>
</tr>`;
}

/* ===== 总工资 = 直接取 Excel 列 P ===== */

let total=salaryData["1-15 工资"] || 0;
document.getElementById("totalAmount").innerText=formatMoney(total);

}

loadSlip();

</script>

</body>
</html>
