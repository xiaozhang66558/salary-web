<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Payslip</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{margin:0;font-family:"Segoe UI",Arial;background:#0f172a;display:flex;justify-content:center;padding:40px;}
.card{width:980px;background:white;border-radius:18px;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,0.35);}
.header{background:linear-gradient(90deg,#0f172a,#1e3a8a);color:white;padding:26px 30px;display:flex;justify-content:space-between;align-items:center;}
.header h1{margin:0;font-size:30px;letter-spacing:2px;}
.header-right{display:flex;gap:15px;align-items:center;}
.section{padding:30px;color:#0f172a;}
.section-title{margin-bottom:14px;font-size:18px;letter-spacing:2px;color:#64748b;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;margin-bottom:26px;}
.info-cell{padding:16px;border-right:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb;background:#f8fafc;}
.info-cell:nth-child(2n){border-right:none;}
.info-title{font-size:11px;color:#64748b;letter-spacing:2px;margin-bottom:6px;text-transform:uppercase;}
.info-value{font-size:15px;font-weight:700;}
table{width:100%;border-collapse:collapse;}
th{background:#e2e8f0;padding:12px;text-align:left;}
td{padding:12px;border-bottom:1px solid #e5e7eb;}
.amount{text-align:right;font-weight:700;}
.earn{color:#16a34a;}
.ded{color:#dc2626;}
.adj{color:#2563eb;}
.total-box{margin-top:20px;background:#0b1220;color:white;padding:24px;border-radius:14px;display:flex;justify-content:space-between;align-items:center;}
.total-amount{font-size:30px;font-weight:900;color:#facc15;}
.actions{margin-top:20px;display:flex;gap:12px;}
.btn{padding:12px 16px;border:none;border-radius:10px;font-weight:700;cursor:pointer;}
.btn-back{background:#334155;color:white;}
.btn-save{background:linear-gradient(45deg,#3b82f6,#06b6d4);color:white;}
.footer{text-align:center;font-size:12px;color:#64748b;padding:18px;border-top:1px solid #e5e7eb;}
</style>
</head>

<body>

<div class="card" id="payslipCard">

<div class="header">
<h1 id="pageTitle">PHIẾU LƯƠNG</h1>
<div class="header-right">
<select id="langSelect">
<option value="vi">Tiếng Việt</option>
<option value="zh">中文</option>
<option value="en">English</option>
<option value="id">Bahasa</option>
</select>
<div id="periodText"></div>
</div>
</div>

<div class="section">

<div class="section-title">THÔNG TIN NHÂN VIÊN</div>

<div class="info-grid">
<div class="info-cell"><div class="info-title">MÃ NHÂN VIÊN</div><div class="info-value" id="empId"></div></div>
<div class="info-cell"><div class="info-title">HỌ TÊN</div><div class="info-value" id="fullName"></div></div>
<div class="info-cell"><div class="info-title">NỀN TẢNG</div><div class="info-value" id="platform"></div></div>
<div class="info-cell"><div class="info-title">VỊ TRÍ</div><div class="info-value" id="position"></div></div>
<div class="info-cell"><div class="info-title">LOẠI TÀI KHOẢN</div><div class="info-value" id="accountType"></div></div>
<div class="info-cell"><div class="info-title">SỐ TÀI KHOẢN</div><div class="info-value" id="accountNumber"></div></div>
<div class="info-cell"><div class="info-title">LƯƠNG CƠ BẢN</div><div class="info-value" id="basicSalary"></div></div>
<div class="info-cell"></div>
</div>

<h3>Chi tiết lương</h3>

<table>
<thead>
<tr>
<th>Hạng mục</th>
<th>Loại</th>
<th class="amount">Số tiền</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div class="total-box">
<div>Thực nhận</div>
<div id="totalAmount" class="total-amount"></div>
</div>

<div class="actions">
<button class="btn btn-back" onclick="goBack()">← Quay lại</button>
<button class="btn btn-save" onclick="captureScreen()">📸 Chụp màn hình</button>
</div>

</div>

<div class="footer">Đây là phiếu lương tạo tự động.</div>
</div>

<script>
const supabaseUrl="https://apbaseiweunvfgeubvzp.supabase.co";
const supabaseKey="sb_publishable_xxx";
const { createClient } = supabase;
const db=createClient(supabaseUrl,supabaseKey);

let salaryData=null,period=null,emp_id=null;

function parseBasic(v){
if(!v) return "-";
let m=String(v).match(/\d+/);
return m?Number(m[0]).toLocaleString():"-";
}

async function load(){
emp_id=localStorage.getItem("emp_id");
period=new URLSearchParams(window.location.search).get("period");
if(!emp_id||!period) return;

document.getElementById("periodText").innerText=period;

const {data,error}=await db.from("salaries")
.select("data")
.eq("emp_id",emp_id)
.eq("period",period)
.single();

if(error||!data){return;}

salaryData=data.data;

document.getElementById("empId").innerText=emp_id;
document.getElementById("fullName").innerText=salaryData["姓名"]||"-";
document.getElementById("platform").innerText=salaryData["盘口"]||"-";
document.getElementById("position").innerText=salaryData["岗位"]||"-";
document.getElementById("accountType").innerText=salaryData["银行/GCASH"]||"-";
document.getElementById("accountNumber").innerText=salaryData["卡号"]||"-";
document.getElementById("basicSalary").innerText=parseBasic(salaryData["基础工资"]);

let tbody=document.getElementById("tbody");
tbody.innerHTML="";

["出勤工资","满勤","休假扣除","押金","额外加扣"].forEach(k=>{
let v=salaryData[k];
if(!v) return;
let n=Number(String(v).replace(/,/g,""));
if(isNaN(n)) return;
let type=(k.includes("扣")||k.includes("押"))?"ded":"earn";
tbody.innerHTML+=`
<tr>
<td>${k}</td>
<td>${type==="earn"?"THU":"TRỪ"}</td>
<td class="amount ${type}">${type==="ded"?"- ":"+ "}${n.toLocaleString()}</td>
</tr>`;
});

let total=salaryData["1-15 工资"];
if(total) document.getElementById("totalAmount").innerText=Number(total.replace(/,/g,"")).toLocaleString();
}

function captureScreen(){
html2canvas(document.getElementById("payslipCard")).then(canvas=>{
let link=document.createElement("a");
link.download="Payslip.png";
link.href=canvas.toDataURL();
link.click();
});
}

function goBack(){window.location.href="dashboard.html";}

load();
</script>

</body>
</html>
