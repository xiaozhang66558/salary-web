<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Payslip</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
margin:0;
font-family:"Segoe UI",Arial;
background:#0f172a;
display:flex;
justify-content:center;
padding:40px;
}
.card{
width:980px;
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 25px 60px rgba(0,0,0,0.35);
}
.header{
background:linear-gradient(90deg,#0f172a,#1e3a8a);
color:white;
padding:26px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}
.header h1{margin:0;font-size:30px;letter-spacing:2px;}
.header-right{display:flex;gap:15px;align-items:center;}
.period{font-size:16px;}
.lang-select select{padding:8px;border-radius:8px;border:none;}

.section{padding:30px;color:#0f172a;}
.section-title{margin-bottom:14px;font-size:18px;letter-spacing:2px;color:#64748b;}

.info-grid{
display:grid;
grid-template-columns:1fr 1fr;
border:1px solid #e5e7eb;
border-radius:12px;
overflow:hidden;
margin-bottom:26px;
}
.info-cell{
padding:16px;
border-right:1px solid #e5e7eb;
border-bottom:1px solid #e5e7eb;
background:#f8fafc;
}
.info-cell:nth-child(2n){border-right:none;}
.info-title{font-size:11px;color:#64748b;letter-spacing:2px;margin-bottom:6px;text-transform:uppercase;}
.info-value{font-size:15px;font-weight:700;}

table{width:100%;border-collapse:collapse;}
th{background:#e2e8f0;padding:12px;text-align:left;}
td{padding:12px;border-bottom:1px solid #e5e7eb;}
.amount{text-align:right;font-weight:700;}
.earn{color:#16a34a;}
.ded{color:#dc2626;}
.adj{color:#2563eb;}

.note{margin-top:10px;font-style:italic;color:#334155;}

.total-box{
margin-top:20px;
background:#0b1220;
color:white;
padding:24px;
border-radius:14px;
display:flex;
justify-content:space-between;
align-items:center;
}
.total-amount{font-size:30px;font-weight:900;color:#facc15;}

.actions{margin-top:20px;display:flex;gap:12px;}
.btn{
padding:12px 18px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
display:inline-flex;
align-items:center;
gap:8px;
font-size:14px;
}
.btn-back{background:#334155;color:white;}
.btn-save{background:linear-gradient(45deg,#3b82f6,#06b6d4);color:white;}

.footer{text-align:center;font-size:12px;color:#64748b;padding:18px;border-top:1px solid #e5e7eb;}
</style>
</head>

<body>

<div class="card" id="payslipCard">

<div class="header">
<h1 id="pageTitle">PAYSLIP</h1>
<div class="header-right">
<div class="lang-select">
<select id="langSelect">
<option value="vi">Tiếng Việt</option>
<option value="zh">中文</option>
<option value="en">English</option>
<option value="id">Bahasa</option>
</select>
</div>
<div class="period" id="periodText"></div>
</div>
</div>

<div class="section">

<div class="section-title" id="empInfoTitle"></div>

<div class="info-grid">
<div class="info-cell"><div class="info-title" id="lblEmpId"></div><div class="info-value" id="empId"></div></div>
<div class="info-cell"><div class="info-title" id="lblFullName"></div><div class="info-value" id="fullName"></div></div>
<div class="info-cell"><div class="info-title" id="lblPlatform"></div><div class="info-value" id="platform"></div></div>
<div class="info-cell"><div class="info-title" id="lblPosition"></div><div class="info-value" id="position"></div></div>
<div class="info-cell"><div class="info-title" id="lblAccountType"></div><div class="info-value" id="accountType"></div></div>
<div class="info-cell"><div class="info-title" id="lblAccountNumber"></div><div class="info-value" id="accountNumber"></div></div>
<div class="info-cell"><div class="info-title" id="lblBasicSalary"></div><div class="info-value" id="basicSalary"></div></div>
<div class="info-cell"></div>
</div>

<h3 id="breakdownTitle"></h3>

<table>
<thead>
<tr>
<th id="thDesc"></th>
<th id="thType"></th>
<th class="amount" id="thAmount"></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div class="note" id="noteBox"></div>

<div class="total-box">
<div id="totalTitle"></div>
<div class="total-amount" id="totalAmount"></div>
</div>

<div class="actions">
<button class="btn btn-back" onclick="goBack()" id="btnBack"></button>
<button class="btn btn-save" onclick="captureScreen()" id="btnSave"></button>
</div>

</div>

<div class="footer" id="footerText"></div>

</div>

<script>

const i18n={
vi:{earn:"THU",ded:"TRỪ",adj:"Đ/C",note:"Ghi chú"},
zh:{earn:"收入",ded:"扣除",adj:"调整",note:"备注"},
en:{earn:"EARN",ded:"DED",adj:"ADJ",note:"Note"},
id:{earn:"MASUK",ded:"POTONG",adj:"ADJ",note:"Catatan"}
};

const salaryTranslate={
vi:{
"出勤工资":"Lương chuyên cần",
"满勤":"Thưởng chuyên cần",
"休假扣除":"Khấu trừ nghỉ phép",
"押金":"Tiền cọc",
"额外加扣":"Điều chỉnh thêm",
"补餐":"Phụ cấp ăn",
"绩效":"Thưởng hiệu suất"
},
zh:{
"出勤工资":"出勤工资",
"满勤":"满勤",
"休假扣除":"休假扣除",
"押金":"押金",
"额外加扣":"额外加扣",
"补餐":"补餐",
"绩效":"绩效"
},
en:{
"出勤工资":"Attendance Salary",
"满勤":"Attendance Bonus",
"休假扣除":"Leave Deduction",
"押金":"Security Deposit",
"额外加扣":"Extra Adjustment",
"补餐":"Meal Allowance",
"绩效":"Performance Bonus"
},
id:{
"出勤工资":"Gaji Kehadiran",
"满勤":"Bonus Kehadiran",
"休假扣除":"Potongan Cuti",
"押金":"Deposit",
"额外加扣":"Penyesuaian",
"补餐":"Tunjangan Makan",
"绩效":"Bonus Kinerja"
}
};

let currentLang=localStorage.getItem("lang")||"vi";

function t(k){return i18n[currentLang][k]||k;}
function ts(k){return salaryTranslate[currentLang][k]||k;}

function num(v){
if(!v) return null;
v=String(v).replace(/,/g,"");
let n=Number(v);
return isNaN(n)?null:n;
}

function render(){
if(!salaryData) return;

let tbody=document.getElementById("tbody");
tbody.innerHTML="";

[
"出勤工资",
"满勤",
"补餐",
"绩效",
"休假扣除",
"押金"
].forEach(k=>{
let n=num(salaryData[k]);
if(n===null) return;

let type=(k.includes("扣")||k.includes("押"))?"ded":"earn";

tbody.innerHTML+=`
<tr>
<td>${ts(k)}</td>
<td>${t(type)}</td>
<td class="amount ${type}">${type==="ded"?"- ":"+ "}${n.toLocaleString()}</td>
</tr>`;
});

let extra=num(salaryData["额外加扣"]);
if(extra!==null){
tbody.innerHTML+=`
<tr>
<td>${ts("额外加扣")}</td>
<td>${t("adj")}</td>
<td class="amount adj">${extra>=0?"+ ":""}${extra.toLocaleString()}</td>
</tr>`;
}
}

</script>

</body>
</html>
