<style>
body{
  margin:0;
  font-family:"Segoe UI", Arial;
  background:#0f172a;
  display:flex;
  justify-content:center;

.card{
  width:980px;

}
.header{

  padding:26px 30px;

}

}
.header-right{

  align-items:center;
}
.period{

}
.lang-select select{
  padding:8px 10px;

  border:none;
  background:rgba(255,255,255,0.95);
  color:#0f172a;

  cursor:pointer;
}
.section{
  padding:30px;
  color:#0f172a;
}
.section-title{
  margin:0 0 14px 0;
  font-size:18px;
  letter-spacing:2px;
  color:#64748b;
}
.info-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  border:1px solid #e5e7eb;
  border-radius:12px;
  overflow:hidden;
  margin-bottom:26px;
}
.info-row{
  display:grid;
  grid-template-columns:1fr 1fr;
}
.info-cell{
  padding:16px 18px;
  border-right:1px solid #e5e7eb;
  border-bottom:1px solid #e5e7eb;
  background:#f8fafc;
}
.info-row .info-cell:last-child{ border-right:none; }
.info-row:last-child .info-cell{ border-bottom:none; }

.info-title{
  font-size:11px;
  color:#64748b;
  letter-spacing:2px;
  margin-bottom:6px;
  text-transform:uppercase;
}
.info-value{
  font-size:15px;
  font-weight:700;
  color:#0f172a;

}

h3{
  margin:0 0 12px 0;
  font-size:20px;
  color:#0f172a;
}

table{

  border-collapse:collapse;
  margin-top:6px;
}
th{
  text-align:left;
  padding:12px 14px;
  background:#e2e8f0;
  font-size:13px;
  color:#0f172a;
}
td{

  border-bottom:1px solid #e5e7eb;
  font-size:14px;
  color:#0f172a;
}
.amount{
  text-align:right;
  font-weight:700;
}
.earn{color:#16a34a;}
.ded{color:#dc2626;}
.adj{color:#2563eb;}

.note{
  margin-top:12px;
  padding-top:10px;
  border-top:1px solid #e5e7eb;
  color:#334155;
  font-size:13px;
  font-style:italic;
}

.total-box{
  margin-top:22px;
  background:#0b1220;
  color:white;
  padding:24px 22px;
  border-radius:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.total-title{
  font-size:18px;
  font-weight:700;
}
.total-amount{
  font-size:30px;
  font-weight:900;
  color:#facc15;
}

.actions{
  margin-top:18px;
  display:flex;
  gap:12px;
}
.btn{
  padding:12px 16px;

.btn-back{

.btn-pdf{

.footer{

  border-top:1px solid #e5e7eb;
}

.error-wrap{
  color:white;
  font-size:18px;
  width:980px;
  text-align:center;
}

@media print{
  body{ background:white; padding:0; }
  .card{ box-shadow:none; border-radius:0; width:100%; }
  .no-print{ display:none !important; }
}

/** ====== helpers ====== **/
function getLang(){
  return localStorage.getItem("lang") || "vi";
}
function setLang(lang){
  localStorage.setItem("lang", lang);
  applyLang(lang);
  renderLastData();
}
function t(key){
  const lang = getLang();
  return (i18n[lang] && i18n[lang][key]) || (i18n.en[key] || key);
}
function labelCol(raw){
  const lang = getLang();
  return (colMap[lang] && colMap[lang][raw]) || raw;
}
function sanitizeNumber(v){
  if(v === null || v === undefined) return null;
  let s = String(v).trim();
  if(!s) return null;
  if(s.toLowerCase() === "nan" || s.toLowerCase() === "null" || s === "-") return null;
  s = s.replace(/,/g, "").replace(/\s+/g, "");
  const n = Number(s);
  if(Number.isNaN(n)) return null;
  return n;
}
function formatMoney(n){
  try{ return Number(n).toLocaleString(); }catch(e){ return String(n); }
}
function getQueryParam(name){
  return new URLSearchParams(window.location.search).get(name);
}
function showError(msg){
  document.getElementById("payslipCard").style.display = "none";
  const e = document.getElementById("errorBox");
  e.style.display = "block";
  e.innerHTML = `
    <div style="padding:30px;background:rgba(255,255,255,0.06);border-radius:14px;">
      <h2 style="margin:0 0 12px 0;">${msg}</h2>
      <button onclick="goBack()" style="margin-top:10px;padding:12px 16px;border:none;border-radius:10px;background:#334155;color:white;font-weight:700;cursor:pointer;">
        ${t("back")}
      </button>
    </div>
  `;
}

/** ====== apply language to whole page ====== **/
function applyLang(lang){
  document.getElementById("pageTitle").innerText = i18n[lang].pageTitle;
  document.getElementById("empInfoTitle").innerText = i18n[lang].empInfoTitle;

  document.getElementById("lblEmpId").innerText = i18n[lang].lblEmpId;
  document.getElementById("lblFullName").innerText = i18n[lang].lblFullName;
  document.getElementById("lblPlatform").innerText = i18n[lang].lblPlatform;
  document.getElementById("lblPosition").innerText = i18n[lang].lblPosition;
  document.getElementById("lblAccountType").innerText = i18n[lang].lblAccountType;
  document.getElementById("lblAccountNumber").innerText = i18n[lang].lblAccountNumber;

  document.getElementById("breakdownTitle").innerText = i18n[lang].breakdownTitle;
  document.getElementById("thDesc").innerText = i18n[lang].thDesc;
  document.getElementById("thType").innerText = i18n[lang].thType;
  document.getElementById("thAmount").innerText = i18n[lang].thAmount;

  document.getElementById("totalTitle").innerText = i18n[lang].totalTitle;
  document.getElementById("footerText").innerText = i18n[lang].footer;

  document.getElementById("btnBack").innerText = i18n[lang].back;
  document.getElementById("btnPDF").innerText = i18n[lang].pdf;

  document.getElementById("langSelect").value = lang;
}

/** ====== main load ====== **/
let lastSalaryData = null;
let lastPeriod = null;
let lastEmpId = null;

async function loadPayslip(){
  const lang = getLang();
  applyLang(lang);

  const empId = localStorage.getItem("emp_id");
  if(!empId){
    window.location.href = "index.html";
    return;
  }

  const period = getQueryParam("period");
  if(!period){
    showError(t("notFound"));
    return;
  }

  document.getElementById("periodText").innerText = period;

  const { data, error } = await db
    .from("salaries")
    .select("data, period")
    .eq("emp_id", empId)
    .eq("period", period)
    .single();

  if(error || !data || !data.data){
    showError(t("notFound"));
    return;
  }

  lastSalaryData = data.data;
  lastPeriod = period;
  lastEmpId = empId;

  render(lastSalaryData, lastPeriod, lastEmpId);
}

function renderLastData(){
  if(lastSalaryData && lastPeriod && lastEmpId){
    render(lastSalaryData, lastPeriod, lastEmpId);
  }
}

function render(salaryData, period, empId){
  // ===== Employee info =====
  const fullName = salaryData["姓名"] || salaryData["name"] || "-";
  const platform = salaryData["盘口"] || "-";
  const position = salaryData["岗位"] || "-";
  const accountType = salaryData["银行/GCASH"] || salaryData["银行"] || "-";
  const accountNumber = salaryData["卡号"] || salaryData["账号"] || salaryData["账户"] || "-";

  document.getElementById("empId").innerText = empId;
  document.getElementById("fullName").innerText = fullName;
  document.getElementById("platform").innerText = platform;
  document.getElementById("position").innerText = position;
  document.getElementById("accountType").innerText = accountType;
  document.getElementById("accountNumber").innerText = accountNumber;

  // ===== Salary Breakdown =====
  // ✅ yêu cầu mới:
  // - "1-15 工资" là tổng => không đưa vào chi tiết
  // - "额外加扣" luôn ở hàng cuối
  //
  // Vì vậy breakdownKeys KHÔNG có "1-15 工资"
  // và ta sẽ render tất cả keys trừ "额外加扣" trước, rồi render "额外加扣" cuối.
  const breakdownKeys = [
    "基础工资",
    "出勤工资",
    "满勤",
    "休假扣除",
    "押金",
    "额外加扣" // vẫn có nhưng sẽ ép xuống cuối
  ];

  const tbody = document.querySelector("#salaryTable tbody");
  tbody.innerHTML = "";

  let totalCalc = 0;
  let hasAnyRow = false;

  function calcType(key){
    let type = "earn";
    if(key.includes("扣") || key.includes("押")) type = "ded";
    if(key.includes("额外") || key.includes("调整")) type = "adj";
    return type;
  }

  function addRow(key){
    if(!(key in salaryData)) return;

    const raw = salaryData[key];
    const n = sanitizeNumber(raw);
    if(n === null) return;

    const type = calcType(key);

    if(type === "earn") totalCalc += n;
    if(type === "ded") totalCalc -= n;
    if(type === "adj") totalCalc += n;

    const typeText = (type === "earn") ? t("earn") : (type === "ded") ? t("ded") : t("adj");

    tbody.innerHTML += `
      <tr>
        <td>${labelCol(key)}</td>
        <td style="font-weight:800;">${typeText}</td>
        <td class="amount ${type}">${type==="ded" ? "- " : "+ "}${formatMoney(n)}</td>
      </tr>
    `;
    hasAnyRow = true;
  }

  // render tất cả trừ 额外加扣 trước
  for(const key of breakdownKeys){
    if(key === "额外加扣") continue;
    addRow(key);
  }
  // render 额外加扣 cuối
  addRow("额外加扣");

  // Note (备注)
  const noteRaw = salaryData["备注"];
  const noteBox = document.getElementById("noteBox");
  if(noteRaw && String(noteRaw).trim() && String(noteRaw).trim().toLowerCase() !== "nan"){
    noteBox.style.display = "block";
    noteBox.innerHTML = `<b>${t("note")}:</b> ${String(noteRaw).trim()}`;
  }else{
    noteBox.style.display = "none";
    noteBox.innerHTML = "";
  }

  // ===== Total =====
  // ✅ "1-15 工资" là tổng => ưu tiên lấy total từ cột này
  // nếu không có thì fallback sang các cột total khác, nếu vẫn không có thì dùng totalCalc
  let totalFromData = null;

  if("1-15 工资" in salaryData){
    const n = sanitizeNumber(salaryData["1-15 工资"]);
    if(n !== null) totalFromData = n;
  }

  if(totalFromData === null){
    const totalCandidates = ["总计","合计","实发","实领","Total","total","THỰC NHẬN","Thực nhận"];
    for(const k of totalCandidates){
      if(k in salaryData){
        const n = sanitizeNumber(salaryData[k]);
        if(n !== null){
          totalFromData = n;
          break;
        }
      }
    }
  }

  const totalFinal = (totalFromData !== null) ? totalFromData : totalCalc;
  document.getElementById("totalAmount").innerText = formatMoney(totalFinal);

  if(!hasAnyRow){
    tbody.innerHTML = `
      <tr>
        <td colspan="3" style="color:#64748b;font-style:italic;">${t("notFound")}</td>
      </tr>
    `;
  }
}

/** ===== actions ===== **/
function goBack(){
  window.location.href = "dashboard.html";
}

function downloadPDF(){
  const element = document.getElementById("payslipCard");
  const period = document.getElementById("periodText").innerText || "period";
  const empId = (localStorage.getItem("emp_id") || "employee");
  const filename = `Payslip_${empId}_${period}.pdf`.replace(/[\/\\:*?"<>|]/g, "-");

  const opt = {
    margin: [10, 10, 10, 10],
    filename,
    image: { type: "jpeg", quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
  };

  html2pdf().set(opt).from(element).save();
}

/** ===== init ===== **/
document.getElementById("langSelect").addEventListener("change", (e)=> setLang(e.target.value));
applyLang(getLang());
loadPayslip();
</script>
