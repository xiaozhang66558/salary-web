<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Payslip</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:"Segoe UI",Arial;
background:#0f172a;
display:flex;
justify-content:center;
padding:40px;
}

.card{
width:950px;
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 30px 80px rgba(0,0,0,0.5);
}

.header{
background:linear-gradient(90deg,#0f172a,#1e3a8a);
color:white;
padding:35px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h1{
margin:0;
letter-spacing:3px;
font-size:30px;
}

.period{
font-size:18px;
opacity:0.9;
}

.section{
padding:35px;
}

.info-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:35px;
}

.info-box{
background:#f1f5f9;
padding:15px;
border-radius:10px;
}

.info-title{
font-size:12px;
color:#64748b;
margin-bottom:6px;
}

.info-value{
font-size:15px;
font-weight:600;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:14px;
background:#e2e8f0;
font-size:13px;
}

td{
padding:14px;
border-bottom:1px solid #e5e7eb;
font-size:14px;
}

.amount{
text-align:right;
font-weight:600;
}

.earn{color:#16a34a;}
.ded{color:#dc2626;}
.adj{color:#2563eb;}

.total-box{
margin-top:30px;
background:#0f172a;
color:white;
padding:30px;
border-radius:14px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
}

.total-box span{
font-size:30px;
font-weight:bold;
color:#facc15;
}

.footer{
text-align:center;
font-size:12px;
color:#64748b;
padding:25px;
border-top:1px solid #e5e7eb;
}
</style>
</head>

<body>

<div class="card">

<div class="header">
<h1 id="titleText">PAYSLIP</h1>

<div style="display:flex;align-items:center;gap:15px;">
<select id="langSelect" onchange="changeLang()" style="padding:6px;border-radius:6px;">
<option value="cn">中文</option>
<option value="vi">Tiếng Việt</option>
<option value="en">English</option>
<option value="ph">Filipino</option>
</select>

<div class="period" id="periodText"></div>
</div>
</div>

<div class="section">

<div class="info-grid" id="infoGrid"></div>

<h3 id="breakdownText">Salary Breakdown</h3>

<table>
<thead>
<tr>
<th id="descText">Description</th>
<th id="typeText">Type</th>
<th class="amount" id="amountText">Amount</th>
</tr>
</thead>
<tbody id="salaryBody"></tbody>
</table>

<div class="total-box">
<div id="totalText">Total Take Home Pay</div>
<span id="totalAmount">0</span>
</div>

</div>

<div class="footer">
This is a computer-generated salary statement.
</div>

</div>

<script>

const supabaseUrl="https://apbaseiweunvfgeubvzp.supabase.co";
const supabaseKey="sb_publishable_Dwob1zf-bHC2etDsbnJREw_sgaHuQDL";
const { createClient } = supabase;
const db=createClient(supabaseUrl,supabaseKey);

/* ===== LANGUAGE DICTIONARY ===== */

const dictionary = {

cn:{
title:"工资单",
breakdown:"工资明细",
desc:"项目",
type:"类型",
amount:"金额",
total:"实发工资",
remark:"备注",
fields:{
"基础工资":"基础工资",
"出勤工资":"出勤工资",
"满勤":"满勤",
"额外加扣":"额外加扣",
"押金":"押金",
"休假扣除":"休假扣除"
}
},

vi:{
title:"Phiếu Lương",
breakdown:"Chi tiết lương",
desc:"Hạng mục",
type:"Loại",
amount:"Số tiền",
total:"Thực nhận",
remark:"Ghi chú",
fields:{
"基础工资":"Lương cơ bản",
"出勤工资":"Lương chuyên cần",
"满勤":"Thưởng chuyên cần",
"额外加扣":"Điều chỉnh thêm",
"押金":"Tiền cọc",
"休假扣除":"Khấu trừ nghỉ phép"
}
},

en:{
title:"Payslip",
breakdown:"Salary Breakdown",
desc:"Description",
type:"Type",
amount:"Amount",
total:"Total Take Home Pay",
remark:"Remark",
fields:{
"基础工资":"Basic Salary",
"出勤工资":"Attendance Salary",
"满勤":"Full Attendance Bonus",
"额外加扣":"Adjustment",
"押金":"Deposit",
"休假扣除":"Leave Deduction"
}
},

ph:{
title:"Payslip",
breakdown:"Breakdown ng Sahod",
desc:"Paglalarawan",
type:"Uri",
amount:"Halaga",
total:"Kabuuang Natanggap",
remark:"Tala",
fields:{
"基础工资":"Batayang Sahod",
"出勤工资":"Sahod sa Attendance",
"满勤":"Bonus sa Attendance",
"额外加扣":"Adjustment",
"押金":"Deposit",
"休假扣除":"Bawas sa Leave"
}
}

};

let currentLang = localStorage.getItem("lang") || "cn";
let salaryDataGlobal=null;

/* ===== CHANGE LANGUAGE ===== */

function changeLang(){
currentLang=document.getElementById("langSelect").value;
localStorage.setItem("lang",currentLang);
applyLang();
}

function applyLang(){

const lang=dictionary[currentLang];

document.getElementById("titleText").innerText=lang.title;
document.getElementById("breakdownText").innerText=lang.breakdown;
document.getElementById("descText").innerText=lang.desc;
document.getElementById("typeText").innerText=lang.type;
document.getElementById("amountText").innerText=lang.amount;
document.getElementById("totalText").innerText=lang.total;

if(salaryDataGlobal){
renderSalary();
}

}

/* ===== LOAD DATA ===== */

async function loadSlip(){

const emp_id=localStorage.getItem("emp_id");
if(!emp_id){
window.location.href="index.html";
return;
}

const urlParams=new URLSearchParams(window.location.search);
const period=urlParams.get("period");
document.getElementById("periodText").innerText=period;

const {data}=await db
.from("salaries")
.select("*")
.eq("emp_id",emp_id)
.eq("period",period)
.single();

salaryDataGlobal=data.data;
renderSalary();
applyLang();
}

/* ===== RENDER SALARY ===== */

function renderSalary(){

const lang=dictionary[currentLang];
const body=document.getElementById("salaryBody");
body.innerHTML="";

let total=salaryDataGlobal["1-15 工资"] || 0;

for(let key in salaryDataGlobal){

if(!lang.fields[key]) continue;

let value=salaryDataGlobal[key] || 0;
let type="earn";
if(key.includes("扣")||key.includes("押")) type="ded";
if(key.includes("额外")) type="adj";

body.innerHTML+=`
<tr>
<td>${lang.fields[key]}</td>
<td>${type.toUpperCase()}</td>
<td class="amount ${type}">${Number(value).toLocaleString()}</td>
</tr>`;
}

/* REMARK */
if(salaryDataGlobal["备注"]){
body.innerHTML+=`
<tr>
<td colspan="3" style="padding-top:20px;font-style:italic;color:#64748b">
${lang.remark}: ${salaryDataGlobal["备注"]}
</td>
</tr>`;
}

document.getElementById("totalAmount").innerText=
Number(total).toLocaleString();

}

document.getElementById("langSelect").value=currentLang;
loadSlip();

</script>

</body>
</html>
