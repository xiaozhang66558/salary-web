<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Salary System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",Arial;}
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at 20% 20%, #1f2a48, #0f172a 60%);
overflow:hidden;
}
.card{
position:relative;z-index:10;
width:420px;padding:45px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 20px 60px rgba(0,0,0,0.6);
color:white;
}
h2{text-align:center;margin-bottom:20px;font-weight:600;}
.input-group{margin-top:20px;}
input{
width:100%;padding:14px;border-radius:10px;border:none;
background:rgba(255,255,255,0.1);
color:white;font-size:14px;
outline:none;
}
.buttons{display:flex;justify-content:space-between;margin-top:25px;}
button{
width:48%;padding:14px;border:none;
border-radius:10px;font-size:14px;
cursor:pointer;
}
.login-btn{background:linear-gradient(45deg,#3b82f6,#06b6d4);color:white;}
.register-btn{background:rgba(255,255,255,0.1);color:white;}
.result{margin-top:20px;font-size:14px;}
.extra{margin-top:15px;text-align:center;font-size:13px;cursor:pointer;color:#60a5fa;}
.lang-select{text-align:right;margin-bottom:15px;}
select{padding:6px;border-radius:6px;background:rgba(255,255,255,0.1);color:white;border:none;}
</style>
</head>

<body>

<div class="card">

<div class="lang-select">
<select onchange="setLanguage(this.value)">
<option value="vi">🇻🇳 VN</option>
<option value="zh">🇨🇳 中文</option>
<option value="en">🇺🇸 EN</option>
<option value="id">🇮🇩 ID</option>
</select>
</div>

<h2 id="title"></h2>

<div class="input-group">
<input type="text" id="userId">
</div>

<div class="input-group">
<input type="password" id="password">
</div>

<div class="buttons">
<button id="loginBtn" class="login-btn" onclick="login()"></button>
<button id="registerBtn" class="register-btn" onclick="register()"></button>
</div>

<div class="extra" onclick="forgotPassword()">🔑 Quên mật khẩu?</div>

<div class="result" id="result"></div>

</div>

<script>
const supabaseUrl = "https://apbaseiweunvfgeubvzp.supabase.co";
const supabaseKey = "sb_publishable_Dwob1zf-bHC2etDsbnJREw_sgaHuQDL";
const { createClient } = supabase;
const supabaseClient = createClient(supabaseUrl, supabaseKey);

/* ================= LOGIN ================= */

async function login(){
const id=userId.value.trim();
const pass=password.value.trim();
const res=result;

const { data } = await supabaseClient
.from("employees")
.select("*")
.eq("emp_id",id)
.eq("password_hash",pass)
.single();

if(!data){
res.innerHTML="❌ Sai ID hoặc mật khẩu";
return;
}

/* yêu cầu nhập PIN */
let pin = prompt("Nhập mã bảo mật 4 số:");
if(!pin || pin !== data.pin_code){
res.innerHTML="❌ Sai mã bảo mật";
return;
}

localStorage.setItem("emp_id", id);
window.location.href="dashboard.html";
}

/* ================= REGISTER ================= */

async function register(){
const id=userId.value.trim();
const pass=password.value.trim();
const res=result;

if(!id||!pass){
res.innerHTML="❌ Vui lòng nhập đủ thông tin";
return;
}

/* kiểm tra tồn tại */
const { data } = await supabaseClient
.from("employees")
.select("emp_id")
.eq("emp_id",id)
.single();

if(data){
res.innerHTML="❌ ID đã tồn tại";
return;
}

/* tạo password */
await supabaseClient
.from("employees")
.insert([{ emp_id:id, password_hash:pass }]);

/* yêu cầu tạo PIN */
let pin = prompt("Tạo mã bảo mật 4 số:");
if(!pin || pin.length!==4){
res.innerHTML="❌ Mã phải 4 số";
return;
}

await supabaseClient
.from("employees")
.update({ pin_code: pin })
.eq("emp_id", id);

res.innerHTML="✅ Thiết lập thành công";
}

/* ================= FORGOT PASSWORD ================= */

async function forgotPassword(){
let id = prompt("Nhập ID:");
if(!id) return;

let pin = prompt("Nhập mã bảo mật 4 số:");
if(!pin) return;

const { data } = await supabaseClient
.from("employees")
.select("*")
.eq("emp_id",id)
.eq("pin_code",pin)
.single();

if(!data){
alert("Sai ID hoặc mã bảo mật");
return;
}

let newPass = prompt("Nhập mật khẩu mới:");
if(!newPass) return;

await supabaseClient
.from("employees")
.update({ password_hash:newPass })
.eq("emp_id", id);

alert("Đổi mật khẩu thành công");
}
</script>

</body>
</html>
