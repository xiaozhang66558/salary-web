<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>工资系统登录</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding-top:100px;
}
.box{
background:white;
width:400px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
input{
padding:10px;
width:80%;
margin-top:10px;
}
button{
padding:10px 20px;
margin-top:10px;
}
.result{
margin-top:20px;
text-align:left;
}
</style>
</head>
<body>

<div class="box">
<h2>员工登录</h2>

<input type="text" id="userId" placeholder="员工ID">
<input type="password" id="password" placeholder="密码">
<br>
<button onclick="login()">登录</button>
<button onclick="register()">首次设置密码</button>

<div class="result" id="result"></div>
</div>

<script>
const supabaseUrl = "https://apbaseiweunvfgeubvzp.supabase.co";
const supabaseKey = "sb_publishable_Dwob1zf-bHC2etDsbnJREw_sgaHuQDL";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function register(){
const id=document.getElementById("userId").value.trim();
const password=document.getElementById("password").value.trim();
if(!id||!password){ alert("请输入ID和密码"); return; }

const { data, error } = await supabase
.from('员工')
.insert([{ 用户名:id, password_hash:password }]);

if(error){
alert("注册失败："+error.message);
}else{
alert("设置成功，请登录");
}
}

async function login(){
const id=document.getElementById("userId").value.trim();
const password=document.getElementById("password").value.trim();
const res=document.getElementById("result");

const { data, error } = await supabase
.from('员工')
.select("*")
.eq("用户名",id)
.eq("password_hash",password)
.single();

if(error||!data){
res.innerHTML="❌ 登录失败";
return;
}

res.innerHTML="<b>登录成功</b>";

const { data:salary } = await supabase
.from('薪资')
.select("*")
.eq("ID",id)
.single();

if(salary){
let html="";
for(let key in salary){
html+=`<p><b>${key}:</b> ${salary[key]}</p>`;
}
res.innerHTML+=html;
}
}
</script>

</body>
</html>
