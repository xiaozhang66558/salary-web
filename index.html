<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Salary System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",Arial;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at 20% 20%, #1f2a48, #0f172a 60%);
overflow:hidden;
}

.card{
position:relative;
z-index:10;
width:420px;
padding:45px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 20px 60px rgba(0,0,0,0.6);
color:white;
}

.lang-select{
position:absolute;
top:20px;
right:20px;
}

.lang-select select{
padding:6px 10px;
border-radius:8px;
background:rgba(255,255,255,0.1);
color:white;
border:none;
cursor:pointer;
}

h2{text-align:center;margin-bottom:20px;font-weight:600;}

.input-group{margin-top:20px;}

input{
width:100%;
padding:14px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
font-size:14px;
outline:none;
}

.buttons{
display:flex;
gap:10px;
margin-top:25px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-size:14px;
cursor:pointer;
font-weight:600;
color:white;
position:relative;
}

.login-btn{
background:linear-gradient(45deg,#3b82f6,#06b6d4);
}

.register-btn{
background:rgba(255,255,255,0.15);
}

.result{
margin-top:20px;
min-height:20px;
}

.spinner{
border:3px solid rgba(255,255,255,0.3);
border-top:3px solid white;
border-radius:50%;
width:18px;
height:18px;
animation:spin 0.8s linear infinite;
display:inline-block;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.forgot{
margin-top:15px;
text-align:center;
font-size:13px;
cursor:pointer;
color:#60a5fa;
}

.modal-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.modal{
width:360px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,0.1);
color:white;
text-align:center;
}

.pin-input{
margin-top:20px;
padding:14px;
width:100%;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
font-size:18px;
text-align:center;
letter-spacing:5px;
}

.modal-buttons{
display:flex;
gap:10px;
margin-top:20px;
}

.modal-buttons button{
flex:1;
}
</style>
</head>

<body>

<div class="card">

<div class="lang-select">
<select id="langSelect" onchange="changeLang(this.value)">
<option value="vi">🇻🇳 VN</option>
<option value="zh">🇨🇳 中文</option>
<option value="en">🇺🇸 EN</option>
<option value="id">🇮🇩 ID</option>
</select>
</div>

<h2 id="title"></h2>

<div class="input-group">
<input type="text" id="userId">
</div>

<div class="input-group">
<input type="password" id="password">
</div>

<div class="buttons">
<button id="loginBtn" class="login-btn" onclick="login()"></button>
<button id="registerBtn" class="register-btn" onclick="register()"></button>
</div>

<div class="forgot" onclick="forgotPassword()" id="forgotText"></div>

<div class="result" id="result"></div>

</div>

<div class="modal-overlay" id="pinModal">
<div class="modal">
<h3 id="pinTitle"></h3>
<input type="password" maxlength="4" id="pinInput" class="pin-input">
<div class="modal-buttons">
<button class="register-btn" onclick="closePinModal()" id="cancelBtn"></button>
<button class="login-btn" onclick="confirmPin()" id="confirmBtn"></button>
</div>
</div>
</div>

<script>
const supabaseUrl="https://apbaseiweunvfgeubvzp.supabase.co";
const supabaseKey="sb_publishable_Dwob1zf-bHC2etDsbnJREw_sgaHuQDL";
const { createClient } = supabase;
const supabaseClient=createClient(supabaseUrl,supabaseKey);

/* ===== LANGUAGE ===== */

const langData={
vi:{title:"Hệ thống lương",id:"Mã nhân viên",pass:"Mật khẩu",login:"Đăng nhập",register:"Thiết lập",forgot:"🔑 Quên mật khẩu?",pinCreate:"Tạo mã bảo mật 4 số",pinEnter:"Nhập mã PIN 4 số",cancel:"Huỷ",confirm:"Xác nhận",wrong:"Sai thông tin"},
zh:{title:"薪资系统",id:"员工ID",pass:"密码",login:"登录",register:"首次设置",forgot:"🔑 忘记密码?",pinCreate:"创建4位安全码",pinEnter:"输入4位PIN",cancel:"取消",confirm:"确定",wrong:"信息错误"},
en:{title:"Salary System",id:"Employee ID",pass:"Password",login:"Login",register:"First Setup",forgot:"🔑 Forgot password?",pinCreate:"Create 4-digit PIN",pinEnter:"Enter 4-digit PIN",cancel:"Cancel",confirm:"Confirm",wrong:"Wrong information"},
id:{title:"Sistem Gaji",id:"ID Karyawan",pass:"Kata Sandi",login:"Masuk",register:"Pengaturan",forgot:"🔑 Lupa password?",pinCreate:"Buat PIN 4 digit",pinEnter:"Masukkan PIN 4 digit",cancel:"Batal",confirm:"Konfirmasi",wrong:"Data salah"}
};

let currentLang=localStorage.getItem("lang")||"vi";
langSelect.value=currentLang;

function applyLang(){
title.innerText=langData[currentLang].title;
userId.placeholder=langData[currentLang].id;
password.placeholder=langData[currentLang].pass;
loginBtn.innerText=langData[currentLang].login;
registerBtn.innerText=langData[currentLang].register;
forgotText.innerText=langData[currentLang].forgot;
cancelBtn.innerText=langData[currentLang].cancel;
confirmBtn.innerText=langData[currentLang].confirm;
}

function changeLang(lang){
currentLang=lang;
localStorage.setItem("lang",lang);
applyLang();
}

applyLang();

/* ===== LOGIN ===== */

let tempUser=null;
let mode="create";

async function login(){
loginBtn.innerHTML='<span class="spinner"></span>';
loginBtn.disabled=true;

const id=userId.value.trim();
const pass=password.value.trim();
const res=result;

const {data}=await supabaseClient
.from("employees")
.select("*")
.eq("emp_id",id)
.eq("password_hash",pass)
.single();

loginBtn.disabled=false;
loginBtn.innerText=langData[currentLang].login;

if(!data){
res.innerHTML="❌ "+langData[currentLang].wrong;
return;
}

tempUser=id;

if(!data.pin_code){
mode="create";
pinTitle.innerText=langData[currentLang].pinCreate;
}else{
mode="login";
pinTitle.innerText=langData[currentLang].pinEnter;
}

openPinModal();
}

/* ===== ĐÂY LÀ PHẦN ĐƯỢC THÊM LẠI ===== */

async function register(){
const id=userId.value.trim();
const pass=password.value.trim();
const res=result;

if(!id||!pass){
res.innerHTML="❌ "+langData[currentLang].wrong;
return;
}

const {data}=await supabaseClient
.from("employees")
.select("emp_id")
.eq("emp_id",id)
.single();

if(data){
res.innerHTML="❌ ID tồn tại";
return;
}

await supabaseClient
.from("employees")
.insert([{emp_id:id,password_hash:pass}]);

tempUser=id;
mode="create";
pinTitle.innerText=langData[currentLang].pinCreate;
openPinModal();
}

/* ===== FORGOT PASSWORD ===== */

async function forgotPassword(){
const id=prompt(langData[currentLang].id);
const pin=prompt(langData[currentLang].pinEnter);

const {data}=await supabaseClient
.from("employees")
.select("*")
.eq("emp_id",id)
.eq("pin_code",pin)
.single();

if(!data){
alert(langData[currentLang].wrong);
return;
}

const newPass=prompt(langData[currentLang].pass);
await supabaseClient
.from("employees")
.update({password_hash:newPass})
.eq("emp_id",id);

alert("OK");
}

/* ===== PIN MODAL ===== */

function openPinModal(){
pinModal.style.display="flex";
pinInput.value="";
}

function closePinModal(){
pinModal.style.display="none";
}

async function confirmPin(){
const pin=pinInput.value.trim();
if(pin.length!==4) return;

if(mode==="create"){
await supabaseClient
.from("employees")
.update({pin_code:pin})
.eq("emp_id",tempUser);
}else{
const {data}=await supabaseClient
.from("employees")
.select("pin_code")
.eq("emp_id",tempUser)
.single();

if(data.pin_code!==pin){
result.innerHTML="❌ "+langData[currentLang].wrong;
return;
}
}

closePinModal();
localStorage.setItem("emp_id",tempUser);
window.location.href="dashboard.html";
}
</script>

</body>
</html>
